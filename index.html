<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>培训签到系统</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh}
nav{background:#fff;padding:16px 24px;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center}
.nav-brand{font-size:18px;font-weight:600;color:#333}
.nav-tabs{display:flex;gap:8px}
.nav-tab{padding:8px 16px;border:none;background:transparent;color:#666;cursor:pointer;border-radius:6px;font-size:14px}
.nav-tab.active{background:#007aff;color:#fff}
.page{display:none;padding:24px;max-width:800px;margin:0 auto}
.page.active{display:block}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.card h3{font-size:16px;font-weight:600;margin-bottom:16px;color:#333}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;color:#666;margin-bottom:6px}
.form-group input{width:100%;padding:12px;border:1px solid #e5e5e5;border-radius:8px;font-size:16px}
.form-group input:focus{outline:none;border-color:#007aff}
.btn{padding:12px 24px;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer}
.btn-primary{background:#007aff;color:#fff;width:100%}
.btn-primary:active{opacity:0.8}
.btn-secondary{background:#f5f5f5;color:#333}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.btn-group .btn{margin-right:8px;margin-bottom:8px}
.qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
.qr-card{background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.qr-card h4{font-size:16px;margin-bottom:8px}
.qr-card p{font-size:12px;color:#999;margin-bottom:16px}
.qr-wrapper{display:inline-block;padding:12px;background:#fff;border:1px solid #e5e5e5;border-radius:8px}
.success{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;flex-direction-column;color:#fff;z-index:1000}
.success.show{display:flex}
.success-icon{width:80px;height:80px;background:#34c759;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:16px}
.success h2{font-size:24px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:#fff;padding:16px;border-radius:10px;text-align:center}
.stat-value{font-size:28px;font-weight:700;color:#007aff}
.stat-label{font-size:12px;color:#999;margin-top:4px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:14px}
th{font-weight:600;color:#666;background:#fafafa}
.empty{text-align:center;padding:40px;color:#999}
textarea{width:100%;height:200px;padding:12px;border:1px solid #e5e5e5;border-radius:8px;font-size:14px;font-family:monospace;resize:vertical}
@media(max-width:600px){.qr-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
<div class="nav-brand">培训签到系统</div>
<div class="nav-tabs">
<button class="nav-tab active" onclick="showPage('admin')">管理</button>
<button class="nav-tab" onclick="showPage('records')">记录</button>
</div>
</nav>

<div id="page-admin" class="page active">
<div class="card">
<h3>基本设置</h3>
<div class="form-group">
<label>培训名称</label>
<input type="text" id="orgName" value="培训签到" placeholder="输入培训名称">
</div>
<button class="btn btn-primary" onclick="generateQR()">生成二维码</button>
</div>

<div class="card">
<h3>数据导入/导出</h3>
<p style="font-size:12px;color:#999;margin-bottom:12px">将下面的数据复制保存，或粘贴之前的数据导入</p>
<textarea id="dataJson" placeholder="签到数据JSON"></textarea>
<div class="btn-group" style="margin-top:12px">
<button class="btn btn-secondary" onclick="importData()">📥 导入数据</button>
<button class="btn btn-secondary" onclick="exportData()">📤 导出数据</button>
<button class="btn btn-secondary" onclick="clearData()">🗑️ 清空数据</button>
</div>
</div>

<div class="qr-grid">
<div class="qr-card">
<h4>✅ 签到</h4>
<p>学员入场扫码</p>
<div class="qr-wrapper"><div id="qr-in"></div></div>
</div>
<div class="qr-card">
<h4>🚪 签退</h4>
<p>学员离场扫码</p>
<div class="qr-wrapper"><div id="qr-out"></div></div>
</div>
</div>
</div>

<div id="page-records" class="page">
<div class="stats">
<div class="stat"><div class="stat-value" id="stat-total">0</div><div class="stat-label">总人数</div></div>
<div class="stat"><div class="stat-value" id="stat-in">0</div><div class="stat-label">签到</div></div>
<div class="stat"><div class="stat-value" id="stat-out">0</div><div class="stat-label">签退</div></div>
</div>
<button class="btn btn-secondary" onclick="renderTable()" style="margin-bottom:16px">🔄 刷新</button>
<div class="card">
<table><thead><tr><th>姓名</th><th>类型</th><th>时间</th></tr></thead><tbody id="tbody"></tbody></table>
<div class="empty" id="empty">暂无记录</div>
</div>
</div>

<div id="page-scan" class="page">
<div class="card" style="text-align:center">
<h2 id="scan-title" style="margin-bottom:24px">签到</h2>
<div class="form-group">
<input type="text" id="scan-name" placeholder="请输入姓名" style="text-align:center;font-size:20px">
</div>
<button class="btn btn-primary" onclick="submit()">确认</button>
</div>
</div>

<div class="success" id="success">
<div class="success-icon">✓</div>
<h2 id="success-text">签到成功</h2>
</div>

<script>
let type = 'in', records = [];

function getRecords(){
  try{
    return JSON.parse(localStorage.getItem('signin_records') || '[]');
  }catch(e){
    return [];
  }
}

function saveRecords(data){
  localStorage.setItem('signin_records', JSON.stringify(data));
}

function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(p==='records')renderTable();
}

function generateQR(){
  const org = document.getElementById('orgName').value || '培训';
  const base = location.href.split('?')[0];
  ['in','out'].forEach(t=>{
    const url = base + '?type=' + t + '&org=' + encodeURIComponent(org);
    document.getElementById('qr-'+t).innerHTML = '';
    new QRCode(document.getElementById('qr-'+t),{text:url,width:150,height:150});
  });
}

function renderTable(){
  records = getRecords();
  document.getElementById('stat-total').textContent = records.length;
  document.getElementById('stat-in').textContent = records.filter(x=>x.type==='in').length;
  document.getElementById('stat-out').textContent = records.filter(x=>x.type==='out').length;
  const tbody = document.getElementById('tbody');
  if(records.length===0){
    tbody.innerHTML = '';
    document.getElementById('empty').style.display = 'block';
  }else{
    document.getElementById('empty').style.display = 'none';
    tbody.innerHTML = records.map(r=>'<tr><td>'+r.name+'</td><td>'+(r.type==='in'?'✅签到':'🚪签退')+'</td><td>'+r.time+'</td></tr>').join('');
  }
}

function submit(){
  const name = document.getElementById('scan-name').value.trim();
  if(!name)return alert('请输入姓名');
  const now = new Date();
  const rec = {name,type,time:now.toLocaleString('zh-CN'),ts:now.getTime()};
  records = getRecords();
  records.unshift(rec);
  saveRecords(records);
  document.getElementById('success-text').textContent = name + (type==='in'?' 签到成功':' 签退成功');
  document.getElementById('success').classList.add('show');
  setTimeout(()=>{
    document.getElementById('success').classList.remove('show');
    document.getElementById('scan-name').value = '';
  },2000);
}

function importData(){
  const data = document.getElementById('dataJson').value.trim();
  if(!data)return alert('请粘贴数据');
  try{
    const arr = JSON.parse(data);
    if(Array.isArray(arr)){
      saveRecords(arr);
      alert('导入成功！共'+arr.length+'条记录');
      renderTable();
    }else{
      alert('数据格式错误');
    }
  }catch(e){
    alert('数据格式错误');
  }
}

function exportData(){
  records = getRecords();
  document.getElementById('dataJson').value = JSON.stringify(records, null, 2);
}

function clearData(){
  if(!confirm('确定清空所有记录？'))return;
  saveRecords([]);
  renderTable();
  alert('已清空');
}

const u = new URLSearchParams(location.search);
if(u.get('type')){
  type = u.get('type');
  document.querySelector('nav').style.display = 'none';
  document.getElementById('page-scan').classList.add('active');
  document.getElementById('scan-title').textContent = type==='in'?'培训签到':'培训签退';
}else{
  generateQR();
  renderTable();
}
</script>
</body>
</html>
